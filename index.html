<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Y-90 Dosimetry Planner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>☢️ Y-90 Dosimetry</h1>
      <p class="subtitle">Partition Model Calculator & Safety Evaluator</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="calc">계산</button>
      <button class="tab" data-tab="result">결과</button>
      <button class="tab" data-tab="refs">문헌 DB</button>
    </nav>

    <!-- Tab: Calculator -->
    <section id="tab-calc" class="tab-content active">

      <!-- Microsphere Toggle -->
      <div class="micro-toggle">
        <button class="micro-btn active" data-micro="resin">Resin (SIR-Spheres)</button>
        <button class="micro-btn" data-micro="glass">Glass (TheraSphere)</button>
      </div>
      <input type="hidden" id="microsphere" value="resin">

      <!-- Scenario Tabs -->
      <div class="scenario-tabs">
        <button class="scenario-tab active" data-scenario="segmentectomy">RS</button>
        <button class="scenario-tab" data-scenario="lobectomy">Lobectomy</button>
        <button class="scenario-tab" data-scenario="hcc">HCC</button>
        <button class="scenario-tab" data-scenario="crclm">CRCLM</button>
        <button class="scenario-tab" data-scenario="bilobar">Bilobar</button>
        <button class="scenario-tab" data-scenario="pvt">PVT</button>
      </div>

      <!-- Dose Guide (auto-updates by micro + scenario) -->
      <div class="card" id="doseGuide">
        <div id="doseGuideContent" class="dose-guide"></div>
      </div>

      <div class="card">
        <h3>기본 정보</h3>
        <div class="form-grid">
          <div class="form-row">
            <label>Child-Pugh</label>
            <select id="childPugh">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </div>
          <div class="form-row">
            <label>치료 의도</label>
            <select id="intent">
              <option value="curative">Curative</option>
              <option value="palliative">Palliative</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>종양 위치</label>
          <input type="text" id="segment" placeholder="예: S6, Right lobe, Caudate">
        </div>
      </div>

      <div class="card">
        <h3>용적 데이터 (mL)</h3>
        <div class="form-grid">
          <div class="form-row">
            <label>Perfused Volume</label>
            <input type="number" id="perfusedVol" step="0.1" placeholder="mL">
          </div>
          <div class="form-row">
            <label>Tumor Volume</label>
            <input type="number" id="tumorVol" step="0.1" placeholder="mL">
          </div>
          <div class="form-row">
            <label>Whole Liver Volume</label>
            <input type="number" id="wholeVol" step="0.1" placeholder="mL (선택)">
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Dosimetry 파라미터</h3>
        <div class="form-grid">
          <div class="form-row">
            <label>T/N Ratio</label>
            <input type="number" id="tnRatio" step="0.1" placeholder="예: 4.3">
          </div>
          <div class="form-row">
            <label>LSF (%)</label>
            <input type="number" id="lsf" step="0.1" placeholder="예: 4.4">
          </div>
          <div class="form-row">
            <label>Lung Mass (g)</label>
            <input type="number" id="lungMass" value="1000" step="1">
          </div>
        </div>
      </div>

      <div class="card">
        <h3>목표 종양 선량 (Gy)</h3>
        <div class="dose-slider-container">
          <input type="range" id="targetDoseSlider" min="50" max="600" value="250" step="10" class="dose-slider">
          <div class="dose-display">
            <span id="targetDoseValue" class="dose-big">250</span>
            <span class="dose-unit">Gy</span>
          </div>
        </div>
        <div class="quick-doses">
          <button class="quick-dose" data-dose="150">150</button>
          <button class="quick-dose" data-dose="200">200</button>
          <button class="quick-dose active" data-dose="250">250</button>
          <button class="quick-dose" data-dose="300">300</button>
          <button class="quick-dose" data-dose="400">400</button>
        </div>
      </div>

      <button id="calcBtn" class="calc-btn">계산하기</button>
    </section>

    <!-- Tab: Results -->
    <section id="tab-result" class="tab-content">
      <div id="resultContainer">
        <div class="empty-state">계산 탭에서 데이터를 입력하고 계산하세요</div>
      </div>
    </section>

    <!-- Tab: References -->
    <section id="tab-refs" class="tab-content">
      <div class="card">
        <div class="search-row">
          <input type="text" id="refSearch" placeholder="논문 검색 (PMID, 저자, 키워드)">
          <select id="refFilter">
            <option value="all">전체</option>
            <option value="threshold">Threshold</option>
            <option value="case">Cases</option>
          </select>
          <select id="refMicro">
            <option value="all">All</option>
            <option value="Resin">Resin</option>
            <option value="Glass">Glass</option>
            <option value="Both">Both</option>
          </select>
        </div>
      </div>
      <div id="refsList"></div>
    </section>
  </div>

  <script src="dosimetry.js"></script>
</body>
</html>
